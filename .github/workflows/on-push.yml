name: Build

on:
  push: # Trigger the workflow on every push event
    branches:
      - '**' # Run on pushes to any branch

# Prevent multiple runs for the same ref from overlapping
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }} 

    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
            exe: .exe
            artifact_os: windows
            artifact_arch: x86_64
        # ubuntu-22.04 # reasonable minimum version    
        # os: [ubuntu-22.04, windows-latest]
        #os: [windows-latest]

    steps:
      - name: Print All Environment Variables
        shell: bash
        run: |
          env | sort
          mount
          echo ${{ runner.os }}
      - name: pwd
        shell: "C:\\Program Files\\Git\\bin\\bash.exe"
        run: |
          pwd
        if: runner.os == 'Windows'
      - name: Install zip
        shell: bash
        run: |
          set -x -u -e
          curl -fsSL -o zip.tar.gz https://packages.jetbrains.team/files/p/ij/intellij-dependencies/msys/zip-3.0-4-x86_64.pkg.tar.gz
          tar -x -f zip.tar.gz -z -C /
          rm zip.tar.gz
          zip -h
        if: runner.os == 'Windows'
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      # TODO enable -c opt later    
      # for now only fastbuild
      - name: Build
        run: bazelisk --batch --nohome_rc --nosystem_rc build -c fastbuild --stamp "--embed_label=$(git rev-parse --short HEAD)" //src:bazel${{ matrix.exe }}
        working-directory: ./bazel

      - name: Publish
        uses: actions/upload-artifact@v4
        with:
          name: bazel-8.1.1-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}${{ matrix.exe }}
      #- name: LS
      #  run: ls -lLR bazel/bazel-bin/
  
# Optional: Add checkout step if you need repo context, though not strictly needed for just printing env vars
#      - name: Check out repository code
#        uses: actions/checkout@v4

